apiVersion: v1
kind: Pod
metadata:
  name: pod-config
spec:
  containers:
    - name: nginx
      image: nginx
      env:
      - name: course
        valueFrom:
          configMapKeyRef:
            name: Aravind123-web
            key: course
      - name: trainer
        valueFrom:
          configMapKeyRef:
            name: Aravind123-web
            key: trainer
      
      