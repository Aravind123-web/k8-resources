apiVersion: apps/v1
kind: ReplicaSet
metadata:
  name: nginx
  # these labels belongs to replicaset resources
  labels:
    app: nginx
    tier: frontend
spec:
   # modify replicas according to your case
  replicas: 3
  selector:
    matchLabels:
      tier: frontend
      app: nginx
   # below is the pod defination
  template:
    metadata:
      # these labels belongs to pod resources
      labels:
        tier: frontend
        app: nginx
        project: some-project
    spec:
      containers:
        - name: nginx
          image: nginx
          ports:
            - containerPort: 80

