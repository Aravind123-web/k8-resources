#PersistentVolumeClaim
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: ebs-dyanamic
spec:
  storageClassName: "expense-ebs" # Specify the StorageClass name
  #volumeName: ebs-dynamic-pv # Specify the name of the PersistentVolume to bind to the claim
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 4Gi
---

# Pod
apiVersion: v1
kind: Pod
metadata:
  name: nginx-dynamic
  labels:
    purpose: ebs-static 
    project: expense
spec:
  containers:
    - name: nginx
      image: nginx
      volumeMounts:
      - name: persistent-storage
        mountPath: /usr/share/nginx/html
  # nodeSelector is used to schedule the pod on a specific node or group of nodes. In this case, we are using the topology.kubernetes.io/zone label to schedule the pod on nodes that are in the us-east-1a availability zone.
  nodeSelector:
    topology.kubernetes.io/zone: us-east-1a
  volumes:
    - name: persistent-storage
      persistentVolumeClaim:
        claimName: ebs-dyanamic
---
